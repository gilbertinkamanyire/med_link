<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Device Showcase - MediLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg-dark: #030712;
            --text-light: #f9fafb;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --phone-frame: #1f2937;
            --phone-bezel: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        /* --- UI Controls --- */
        .controls {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .controls.minimized {
            transform: translateY(-50%) translateX(-250px);
            opacity: 0.5;
        }

        .controls h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .color-picker {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.2);
        }

        .color-swatch.active {
            border-color: white;
        }

        /* --- Device Frame --- */
        .showcase-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            width: 100%;
            perspective: 1000px;
        }

        .phone-frame {
            position: relative;
            width: 380px;
            height: 780px;
            background: var(--phone-frame);
            border-radius: 55px;
            padding: 12px;
            box-shadow: 
                0 0 0 2px #374151,
                0 20px 50px rgba(0,0,0,0.8),
                inset 0 0 2px 2px rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        .phone-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 44px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Notch / Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            transition: all 0.3s;
        }

        .dynamic-island:hover {
            width: 200px;
            height: 40px;
        }

        /* Screen Content */
        .screen-content {
            flex: 1;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .placeholder-text {
            text-align: center;
            padding: 40px;
            color: #4b5563;
        }

        .placeholder-text svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        video#camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* --- Buttons/Indicators on Frame --- */
        .side-btn {
            position: absolute;
            background: #111;
            width: 3px;
        }
        .btn-silent { top: 120px; left: -3px; height: 35px; border-radius: 2px 0 0 2px; }
        .btn-vol-up { top: 180px; left: -3px; height: 60px; border-radius: 2px 0 0 2px; }
        .btn-vol-down { top: 250px; left: -3px; height: 60px; border-radius: 2px 0 0 2px; }
        .btn-power { top: 220px; right: -3px; height: 100px; border-radius: 0 2px 2px 0; }

        /* --- UI Elements --- */
        .tip {
            position: fixed;
            bottom: 30px;
            color: #6b7280;
            font-size: 0.9rem;
        }

        input[type="file"] {
            display: none;
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }

        .phone-frame.animated {
            animation: float 6s ease-in-out infinite;
        }

        /* Hide UI for "Taking Pics" */
        .hide-ui .controls, .hide-ui .tip {
            display: none;
        }

        .screenshot-mode .phone-frame {
            transform: scale(1.1);
        }

        .canvas-container {
            display: none;
        }
    </style>
</head>
<body id="main-body">

    <div class="controls" id="control-panel">
        <h2>Device Studio</h2>
        
        <div class="control-group">
            <label>Content Source</label>
            <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload App Screenshot
            </button>
            <button class="btn btn-outline" id="camera-toggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                Live Camera Mode
            </button>
        </div>

        <div class="control-group">
            <label>Background Theme</label>
            <div class="color-picker">
                <div class="color-swatch active" style="background: #030712;" onclick="setBg('#030712', this)"></div>
                <div class="color-swatch" style="background: linear-gradient(135deg, #1e3a8a, #581c87);" onclick="setBg('linear-gradient(135deg, #1e3a8a, #581c87)', this)"></div>
                <div class="color-swatch" style="background: linear-gradient(135deg, #064e3b, #0f172a);" onclick="setBg('linear-gradient(135deg, #064e3b, #0f172a)', this)"></div>
                <div class="color-swatch" style="background: #ffffff;" onclick="setBg('#ffffff', this)"></div>
            </div>
        </div>

        <div class="control-group">
            <label>Display Options</label>
            <button class="btn btn-outline" onclick="toggleAnimation()">
                Toggle Floating Animation
            </button>
            <button class="btn btn-outline" onclick="toggleRotation()">
                Perspective View
            </button>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <button class="btn btn-primary" style="background: #10b981;" onclick="takePicture()">
                Capture Scene
            </button>
            <p style="font-size: 0.7rem; color: #6b7280; text-align: center; margin-top: 10px;">
                Alternatively, press 'H' to hide UI then take a screenshot.
            </p>
        </div>
        
        <button class="btn btn-outline" style="margin-top: 10px;" onclick="maximizeUI()">Close Studio</button>
    </div>

    <input type="file" id="file-input" accept="image/*">

    <div class="showcase-container" id="showcase">
        <div class="phone-frame animated" id="phone">
            <div class="side-btn btn-silent"></div>
            <div class="side-btn btn-vol-up"></div>
            <div class="side-btn btn-vol-down"></div>
            <div class="side-btn btn-power"></div>
            
            <div class="phone-inner">
                <div class="dynamic-island"></div>
                <div class="screen-content" id="screen">
                    <div class="placeholder-text" id="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                        <p>Upload a screenshot of <b>MediLink</b> to see it in the frame.</p>
                    </div>
                    <video id="camera-feed" autoplay playsinline></video>
                </div>
            </div>
        </div>
    </div>

    <div class="tip">
        Press <b>[H]</b> to hide controls | <b>[C]</b> to capture
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const phone = document.getElementById('phone');
        const screen = document.getElementById('screen');
        const placeholder = document.getElementById('placeholder');
        const fileInput = document.getElementById('file-input');
        const cameraFeed = document.getElementById('camera-feed');
        const cameraToggle = document.getElementById('camera-toggle');
        const body = document.getElementById('main-body');
        const controls = document.getElementById('control-panel');

        let isCameraOn = false;
        let isRotated = false;

        // --- File Upload ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    screen.style.backgroundImage = `url(${event.target.result})`;
                    placeholder.style.display = 'none';
                    cameraFeed.style.display = 'none';
                    isCameraOn = false;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Camera Toggle ---
        cameraToggle.addEventListener('click', async () => {
            if (!isCameraOn) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    cameraFeed.srcObject = stream;
                    cameraFeed.style.display = 'block';
                    screen.style.backgroundImage = 'none';
                    placeholder.style.display = 'none';
                    isCameraOn = true;
                } catch (err) {
                    alert("Camera access denied or not available.");
                }
            } else {
                const tracks = cameraFeed.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                cameraFeed.style.display = 'none';
                placeholder.style.display = 'block';
                isCameraOn = false;
            }
        });

        // --- UI Interactions ---
        function setBg(bg, el) {
            body.style.background = bg;
            if (!bg.includes('gradient')) body.style.backgroundColor = bg;
            
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            
            if (bg === '#ffffff') {
                body.style.color = '#000';
                document.querySelector('.tip').style.color = '#666';
            } else {
                body.style.color = '#fff';
                document.querySelector('.tip').style.color = '#6b7280';
            }
        }

        function toggleAnimation() {
            phone.classList.toggle('animated');
        }

        function toggleRotation() {
            isRotated = !isRotated;
            if (isRotated) {
                phone.style.transform = 'rotateY(-20deg) rotateX(10deg)';
                phone.classList.remove('animated');
            } else {
                phone.style.transform = 'none';
                phone.classList.add('animated');
            }
        }

        function maximizeUI() {
            controls.classList.toggle('minimized');
        }

        // --- Keyboard Shortcuts ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                body.classList.toggle('hide-ui');
            }
            if (e.key.toLowerCase() === 'c') {
                takePicture();
            }
        });

        // --- Capture Feature ---
        async function takePicture() {
            body.classList.add('hide-ui');
            body.classList.add('screenshot-mode');
            
            // Give time for UI to hide
            setTimeout(async () => {
                const canvas = await html2canvas(document.body, {
                    backgroundColor: null,
                    scale: 2
                });
                
                const link = document.createElement('a');
                link.download = `MediLink_Showcase_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                body.classList.remove('hide-ui');
                body.classList.remove('screenshot-mode');
            }, 500);
        }
    </script>
</body>
</html>
